name: EAS Build

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   push → main / master   →  production build  (both platforms, auto-increment)
#   push → any other branch →  preview build     (APK + iOS simulator, internal)
#   pull_request           →  preview build     (same, + PR comment with links)
#
# Required GitHub secret:
#   EXPO_TOKEN  — create at expo.dev/settings/access-tokens, add under
#                 github.com/<owner>/<repo>/settings/secrets/actions
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

# Cancel an in-progress run for the same branch when a new push arrives
concurrency:
  group: eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Resolve build profile ─────────────────────────────────────────────────
  resolve:
    name: Resolve build profile
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.pick.outputs.profile }}
      label:   ${{ steps.pick.outputs.label }}
    steps:
      - id: pick
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "label=🚀 Production"  >> "$GITHUB_OUTPUT"
          else
            echo "profile=preview"    >> "$GITHUB_OUTPUT"
            echo "label=🔬 Preview ($BRANCH)" >> "$GITHUB_OUTPUT"
          fi

  # ── Android ──────────────────────────────────────────────────────────────
  android:
    name: Android — ${{ needs.resolve.outputs.label }}
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund --no-audit

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build — Android
        run: |
          eas build \
            --platform android \
            --profile ${{ needs.resolve.outputs.profile }} \
            --non-interactive \
            --no-wait \
            --clear-cache
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── iOS ───────────────────────────────────────────────────────────────────
  ios:
    name: iOS — ${{ needs.resolve.outputs.label }}
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund --no-audit

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build — iOS
        run: |
          eas build \
            --platform ios \
            --profile ${{ needs.resolve.outputs.profile }} \
            --non-interactive \
            --no-wait \
            --clear-cache
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── PR comment with EAS dashboard link ───────────────────────────────────
  comment:
    name: Post build links on PR
    runs-on: ubuntu-latest
    needs: [resolve, android, ios]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Fetch EAS project info
        id: eas-info
        run: |
          # Extract the Expo account/project slug from eas.json if present,
          # otherwise fall back to the repo owner.
          ACCOUNT="${{ github.repository_owner }}"
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - uses: actions/github-script@v7
        with:
          script: |
            const profile  = '${{ needs.resolve.outputs.profile }}';
            const account  = '${{ steps.eas-info.outputs.account }}';
            const sha      = context.sha.slice(0, 7);
            const branch   = '${{ github.head_ref }}';
            const runUrl   = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const easUrl   = `https://expo.dev/accounts/${account}/projects/vocolens/builds`;

            const body = [
              `## 📱 EAS Build — \`${profile}\` profile`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Profile** | \`${profile}\` |`,
              `| **CI run** | [View logs](${runUrl}) |`,
              `| **EAS builds** | [Open dashboard](${easUrl}) |`,
              ``,
              `Both Android and iOS builds have been queued on EAS servers.`,
              `They appear on the EAS dashboard once complete.`,
              ``,
              `> Builds run with \`--no-wait\` — CI exits immediately and does not consume runner minutes during compilation.`,
            ].join('\n');

            // Delete any previous bot comment on this PR to keep it tidy
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const prev = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('EAS Build')
            );
            if (prev) {
              await github.rest.issues.updateComment({
                comment_id: prev.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
