name: EAS Build

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
#   push  → main / master  : production build (both platforms)
#   push  → any other branch: preview build   (APK + iOS simulator)
#   pull_request            : preview build   (lets reviewers test before merge)
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - '**'           # every branch gets a build
  pull_request:
    branches:
      - main
      - master

jobs:
  # ── Decide which EAS profile to use ─────────────────────────────────────────
  determine-profile:
    name: Determine build profile
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.pick.outputs.profile }}
      label:   ${{ steps.pick.outputs.label }}
    steps:
      - id: pick
        run: |
          # PRs and non-default branches → preview
          # main / master pushes         → production
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "label=🚀 Production" >> "$GITHUB_OUTPUT"
          else
            echo "profile=preview"    >> "$GITHUB_OUTPUT"
            echo "label=🔬 Preview ($BRANCH)" >> "$GITHUB_OUTPUT"
          fi

  # ── Android build ────────────────────────────────────────────────────────────
  build-android:
    name: Android — ${{ needs.determine-profile.outputs.label }}
    runs-on: ubuntu-latest
    needs: determine-profile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS build (Android)
        run: |
          eas build \
            --platform android \
            --profile ${{ needs.determine-profile.outputs.profile }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── iOS build ────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS — ${{ needs.determine-profile.outputs.label }}
    runs-on: ubuntu-latest
    needs: determine-profile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS build (iOS)
        run: |
          eas build \
            --platform ios \
            --profile ${{ needs.determine-profile.outputs.profile }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── Summary comment on PRs ───────────────────────────────────────────────────
  pr-comment:
    name: Post build links
    runs-on: ubuntu-latest
    needs: [determine-profile, build-android, build-ios]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const profile = '${{ needs.determine-profile.outputs.profile }}';
            const sha = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const easUrl = `https://expo.dev/accounts/[your-account]/projects/vocolens/builds`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `## 📱 EAS Build triggered — \`${profile}\` profile`,
                ``,
                `| | |`,
                `|---|---|`,
                `| **Commit** | \`${sha}\` |`,
                `| **Profile** | \`${profile}\` |`,
                `| **Workflow run** | [View logs](${runUrl}) |`,
                `| **EAS dashboard** | [View builds](${easUrl}) |`,
                ``,
                `Builds are queued on EAS servers. Once complete they will appear on the EAS dashboard above.`,
                ``,
                `> ℹ️ Builds were submitted with \`--no-wait\`. Check the EAS dashboard for status and download links.`,
              ].join('\n'),
            });
