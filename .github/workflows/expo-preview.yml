name: PR Preview (EAS Update)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Publish preview update
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund --no-audit

      - name: Install EAS CLI
        run: npm install -g eas-cli@19.0.1

      - name: Publish EAS Update for PR
        run: |
          eas update \
            --branch main \
            --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Comment on PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const sha = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `## 📱 OTA Preview Published`,
              ``,
              `An update has been published to the \`main\` channel.`,
              ``,
              `**To see the changes:**`,
              `1. Open the **Vocolens** dev build on your phone`,
              `2. Force-close the app completely`,
              `3. Re-open it — the update downloads automatically`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Commit** | \`${sha}\` |`,
              `| **CI run** | [View logs](${runUrl}) |`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const prev = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('OTA Preview Published')
            );
            if (prev) {
              await github.rest.issues.updateComment({
                comment_id: prev.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
